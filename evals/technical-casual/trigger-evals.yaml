version: 1
skill: technical-casual
eval_type: trigger
cases:
  - id: tc_trigger_001
    should_trigger: true
    title: Vector clocks explainer
    prompt: |
      Write a beginner-friendly article explaining vector clocks to application developers.
      Use a concrete example and keep the tone relaxed.
    rationale:
      - long-form technical explainer
      - intuition-building is important
      - a concrete example would help

  - id: tc_trigger_002
    should_trigger: true
    title: Reference counting walkthrough
    prompt: |
      Explain reference counting in memory management in a visual, step-by-step way for junior engineers.
    rationale:
      - walkthrough-based teaching prompt
      - visual explanation is requested directly

  - id: tc_trigger_003
    should_trigger: true
    title: Base64 tutorial
    prompt: |
      Create a tutorial-style explainer on how Base64 encoding works.
      Build intuition first and avoid sounding formal.
    rationale:
      - concept benefits from model-based explanation
      - tone request matches the skill

  - id: tc_trigger_004
    should_trigger: true
    title: Cache invalidation tradeoff explainer
    prompt: |
      Teach me cache invalidation like I'm a software engineer who knows the basics but wants a good mental model.
    rationale:
      - engineering tradeoffs
      - concept is abstract but teachable through examples

  - id: tc_trigger_009
    should_trigger: true
    title: Rear differential explainer
    prompt: |
      Explain what a car's rear differential does in a visual, beginner-friendly way.
      Use a concrete driving example and keep the tone relaxed.
    rationale:
      - mechanical system with inspectable moving parts
      - the topic benefits from a step-by-step visual explanation

  - id: tc_trigger_010
    should_trigger: true
    title: Three-phase power walkthrough
    prompt: |
      Write a clear explainer on how three-phase AC power works for a curious apprentice electrician.
      Build intuition before jargon and use practical examples.
    rationale:
      - electrical concept with evolving state
      - asks for intuition-first teaching explicitly

  - id: tc_trigger_011
    should_trigger: true
    title: Standard deviation intuition guide
    prompt: |
      Teach standard deviation to a technical audience using a concrete example and an informal tone.
    rationale:
      - math topic that benefits from a stable teaching anchor
      - the requested tone and structure match the skill

  - id: tc_trigger_012
    should_trigger: true
    title: Injection molding process explainer
    prompt: |
      Create a visual article explaining how injection molding works and why defects like sink marks happen.
    rationale:
      - manufacturing process with clear stages
      - a visual walkthrough is a natural fit

  - id: tc_trigger_005
    should_trigger: false
    title: API reference request
    prompt: |
      Write terse API documentation for a function called fetchWithRetry, including parameters, return type, and exceptions.
    rationale:
      - reference docs, not an explainer
      - the skill should stay out of the way

  - id: tc_trigger_006
    should_trigger: false
    title: Release notes request
    prompt: |
      Draft concise release notes for version 2.4.1 with bug fixes and dependency updates.
    rationale:
      - changelog format
      - no need for the teaching pattern

  - id: tc_trigger_007
    should_trigger: false
    title: Formal abstract request
    prompt: |
      Write a formal abstract about eventual consistency in distributed systems for an academic audience.
    rationale:
      - formal register requested
      - the casual voice is a bad fit

  - id: tc_trigger_008
    should_trigger: false
    title: One-paragraph summary request
    prompt: |
      Summarize this benchmark result in one neutral paragraph for an internal memo.
    rationale:
      - concise summary task
      - no room for the skill's full structure

  - id: tc_trigger_013
    should_trigger: false
    title: Steam engine history essay
    prompt: |
      Write a short essay about how the steam engine changed society during the Industrial Revolution.
    rationale:
      - history topic
      - interpretation and context matter more than mechanism

  - id: tc_trigger_014
    should_trigger: false
    title: Philosophy of mathematics prompt
    prompt: |
      Write a reflective essay on whether mathematical truths are discovered or invented.
    rationale:
      - philosophy topic
      - not an inspectable technical mechanism explainer

  - id: tc_trigger_015
    should_trigger: false
    title: Manufacturing SOP checklist
    prompt: |
      Draft a step-by-step standard operating procedure checklist for starting up an injection molding machine.
    rationale:
      - operational checklist, not a teaching-style explainer
      - precision and brevity matter more than the skill's narrative structure
